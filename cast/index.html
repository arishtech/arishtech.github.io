<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PreetTV Cast Receiver</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        /* CAF requires <cast-media-player> in the page; playback video is bound via setMediaElement(#castVideo). */
        cast-media-player {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            visibility: hidden;
            pointer-events: none;
            z-index: -1;
            --progress-color: #ff0000;
            --splash-image: none;
        }

        #castVideo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 0;
            background: #000;
        }

        /* Channel title + watermark overlay (pointer-events none — does not block touches). */
        .cast-chrome {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .cast-channel-title {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            box-sizing: border-box;
            padding: 12px 16px 28px;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: clamp(15px, 2.4vmin, 22px);
            font-weight: 600;
            color: #fff;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9), 0 0 12px rgba(0, 0, 0, 0.75);
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.72) 0%, rgba(0, 0, 0, 0.35) 55%, transparent 100%);
        }

        .cast-watermark {
            position: absolute;
            left: 50%;
            bottom: 8%;
            transform: translateX(-50%);
            max-width: 96vw;
            box-sizing: border-box;
            padding: 6px 14px;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: clamp(11px, 1.85vmin, 16px);
            font-weight: 500;
            letter-spacing: 0.03em;
            color: rgba(255, 255, 255, 0.42);
            text-align: center;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }

        /* Full-screen loader between LOAD and first frames */
        .cast-loader {
            position: fixed;
            inset: 0;
            z-index: 12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.58);
            pointer-events: none;
        }

        .cast-loader-spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.22);
            border-top-color: rgba(255, 255, 255, 0.95);
            animation: preet-cast-spin 0.85s linear infinite;
        }

        @keyframes preet-cast-spin {
            to { transform: rotate(360deg); }
        }

        .cast-loader-label {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: clamp(14px, 2vmin, 18px);
            color: rgba(255, 255, 255, 0.88);
            letter-spacing: 0.02em;
        }

        .receiver-loader-hidden {
            display: none !important;
        }

        /* Log overlay: selectable, scrollable (D-pad / wheel / touch). Must allow pointer-events for selection. */
        #debug {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            max-height: 38vh;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            overscroll-behavior: contain;
            box-sizing: border-box;
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.88);
            color: #7bed9f;
            font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
            font-size: clamp(9px, 1.05vmin, 11px);
            line-height: 1.4;
            z-index: 2147483647;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
            outline: none;
        }

        #debug .log-row {
            margin: 0 0 2px 0;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        #debug .log-row-error {
            color: #ff8787;
        }

        #debug .log-row-warn {
            color: #ffe066;
        }

        /* Hidden when Cast “debug log” is off (see receiver.js syncReceiverLogPanelFromSources). */
        #debug.receiver-log-hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>
    <video id="castVideo" playsinline crossorigin="anonymous"></video>
    <div id="castChrome" class="cast-chrome" aria-hidden="false">
        <div id="castChannelTitle" class="cast-channel-title" role="status" aria-live="polite"></div>
        <div class="cast-watermark" aria-hidden="true">Preet Live Streaming Player</div>
    </div>
    <div id="castLoader" class="cast-loader receiver-loader-hidden" aria-hidden="true" aria-busy="false" role="status" aria-live="polite">
        <div class="cast-loader-spinner" aria-hidden="true"></div>
        <div class="cast-loader-label">Loading…</div>
    </div>
    <div id="debug" class="log-viewer" tabindex="0" role="log" aria-label="Receiver debug log"></div>
    <!-- Hls.js / dash.js / mpegts.js: chosen at runtime from sender customData + URL (see receiver.js choosePlaybackEngine). -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dashjs@4.7.4/dist/dash.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="receiver.js"></script>
</body>
</html>

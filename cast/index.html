<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PreetTV Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <!-- HLS.js: handles HLS (m3u8) streams -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
  <!-- DASH.js: handles DASH (mpd) and many IPTV container formats -->
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <!-- mpegts.js: handles raw MPEG-TS streams (extension=ts, live.php TS output) -->
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      opacity: 0.7;
      font-size: 10px;
      display: none;
      z-index: 10002;
    }
    #preetBrand {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 28px 24px 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.72) 0%, rgba(0, 0, 0, 0) 100%);
      z-index: 10003;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #preetBrand.hidden {
      opacity: 0;
    }
    #preetBrand .preet-brand-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }
    #preetBrand .preet-brand-sub {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.72);
    }
    #preetLoader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      z-index: 10004;
      pointer-events: none;
    }
    #preetLoader.hidden {
      display: none;
    }
    .preet-loader-spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(76, 175, 80, 0.25);
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: preet-spin 0.9s linear infinite;
    }
    .preet-loader-text {
      margin-top: 14px;
      font-size: 15px;
      color: #fff;
      opacity: 0.9;
      text-align: center;
      max-width: 80%;
    }
    @keyframes preet-spin {
      to { transform: rotate(360deg); }
    }
    #debugPanel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 34vh;
      min-height: 140px;
      max-height: 280px;
      background: rgba(0, 0, 0, 0.9);
      border-top: 2px solid #4CAF50;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: monospace;
      z-index: 10005;
    }
    #debugPanel.hidden {
      display: none;
    }
    #debugHeader {
      background: #1a1a1a;
      border-bottom: 1px solid #4CAF50;
      padding: 4px 8px;
      font-size: 9px;
      font-weight: bold;
      color: #4CAF50;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #debugAutoScrollBtn {
      background: #333;
      color: #4CAF50;
      border: 1px solid #4CAF50;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 8px;
      font-weight: bold;
      flex-shrink: 0;
    }
    #debugAutoScrollBtn.active {
      background: #4CAF50;
      color: #000;
    }
    #debugLogs {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
      font-size: 8px;
      line-height: 1.15;
    }
    .debugEntry {
      margin-bottom: 2px;
      padding: 1px 0 1px 4px;
      border-left: 1px solid #4CAF50;
      color: #9dff9d;
    }
    .debugEntry .line {
      display: flex;
      gap: 4px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .debugEntry .timestamp {
      color: #666;
      font-size: 7px;
      flex-shrink: 0;
    }
    .debugEntry .seq {
      color: #4CAF50;
      font-weight: bold;
      font-size: 7px;
      flex-shrink: 0;
    }
    .debugEntry .event {
      color: #7dffb0;
      font-weight: bold;
      font-size: 8px;
    }
    .debugEntry .payload {
      color: #6fdc6f;
      font-size: 7px;
      word-break: break-all;
      opacity: 0.95;
    }
    #debugToggle {
      position: fixed;
      top: 8px;
      right: 8px;
      background: #4CAF50;
      color: #000;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      font-size: 9px;
      z-index: 10006;
      display: none;
    }
    #debugToggle:hover {
      background: #45a049;
    }
    /* Debug UI is opt-in only: add ?debug=1 to the receiver URL */
    body.receiver-debug #debugToggle,
    body.receiver-debug #status {
      display: block;
    }
    body.receiver-debug #debugPanel:not(.hidden) {
      display: flex;
    }
  </style>
</head>
<body>
  <!-- Custom video element: allows HLS.js to be attached (replaces <cast-media-player>) -->
  <video id="castVideo"
         playsinline
         preload="auto"
         crossorigin="anonymous"
         style="position:absolute;top:0;left:0;width:100%;height:100%;background:#000;">
  </video>

  <div id="preetBrand">
    <div class="preet-brand-title">Preet Live Streaming Player</div>
    <div class="preet-brand-sub">Cast Receiver</div>
  </div>

  <div id="preetLoader" class="hidden">
    <div class="preet-loader-spinner" aria-hidden="true"></div>
    <div class="preet-loader-text" id="preetLoaderText">Loading stream…</div>
  </div>

  <div id="status" aria-hidden="true"></div>

  <!-- Browser-mode stream tester (hidden when Cast is active) -->
  <div id="browserControls" style="
    display:none;
    position:absolute;
    bottom:20px;left:20px;
    background:rgba(0,0,0,0.85);
    border:1px solid #4CAF50;
    padding:14px;border-radius:4px;
    z-index:100;max-width:340px;
    font-family:Arial,sans-serif;
    font-size:12px;color:#fff;">
    <div style="color:#4CAF50;font-weight:bold;margin-bottom:8px;">Stream Tester (browser mode)</div>
    <input id="bcStreamUrl" type="text" placeholder="http://... stream URL"
      style="width:100%;padding:6px;margin-bottom:8px;background:#222;border:1px solid #4CAF50;
             color:#fff;border-radius:3px;font-family:monospace;font-size:11px;box-sizing:border-box;" />
    <button onclick="bcLoad()" style="background:#4CAF50;color:#000;border:none;
      padding:7px 12px;border-radius:3px;cursor:pointer;font-weight:bold;font-size:12px;">
      Load
    </button>
    <button onclick="bcStop()" style="background:#666;color:#fff;border:none;
      padding:7px 12px;border-radius:3px;cursor:pointer;font-weight:bold;font-size:12px;margin-left:5px;">
      Stop
    </button>
  </div>

  <!-- Debug Panel -->
  <button id="debugToggle">DEBUG: OFF</button>
  <div id="debugPanel" class="hidden">
    <div id="debugHeader">
      <span id="debugHeaderTitle">PreetTV Debug Logs (Click to collapse)</span>
      <button id="debugAutoScrollBtn" type="button" class="active" title="Toggle auto-scroll">Auto-scroll: ON</button>
    </div>
    <div id="debugLogs"></div>
  </div>

  <script>
    (function () {
      function isReceiverDebugUiEnabled() {
        try {
          const value = String(new URLSearchParams(window.location.search || "").get("debug") || "")
            .trim()
            .toLowerCase();
          return value === "1" || value === "true" || value === "yes" || value === "verbose";
        } catch (_e) {
          return false;
        }
      }
      window.__preettvReceiverDebugUi = isReceiverDebugUiEnabled;
      if (isReceiverDebugUiEnabled()) {
        document.body.classList.add("receiver-debug");
      }
      const history = Array.isArray(window.__preettvDebug) ? window.__preettvDebug : [];
      window.__preettvDebug = history;
      if (!isReceiverDebugUiEnabled()) return;
      function push(event, payload) {
        const seq = history.length > 0 ? Number(history[history.length - 1].seq || history.length) + 1 : 1;
        history.push({ seq, ts: new Date().toISOString(), event, payload: payload || {} });
      }
      push("ui.bootstrap", { href: window.location.href });
      window.addEventListener("error", function (ev) {
        push("ui.error.early", {
          message: ev && ev.message ? ev.message : "unknown",
          filename: ev && ev.filename ? ev.filename : "",
          lineno: ev && ev.lineno ? ev.lineno : 0,
          colno: ev && ev.colno ? ev.colno : 0,
        });
      });
      window.addEventListener("unhandledrejection", function (ev) {
        const reason = ev && ev.reason;
        push("ui.unhandledrejection.early", {
          reason: reason && reason.message ? reason.message : String(reason || "unknown"),
        });
      });
    })();
  </script>
  <script src="receiver.js"></script>
  <script>
    // Debug panel UI controller
    const debugPanel = document.getElementById('debugPanel');
    const debugToggle = document.getElementById('debugToggle');
    const debugLogsContainer = document.getElementById('debugLogs');
    const debugHeader = document.getElementById('debugHeader');
    const debugHeaderTitle = document.getElementById('debugHeaderTitle');
    const debugAutoScrollBtn = document.getElementById('debugAutoScrollBtn');

    let receiverDebugUiActive = typeof window.__preettvReceiverDebugUi === "function"
      ? window.__preettvReceiverDebugUi()
      : false;
    let debugPanelVisible = false;
    let debugAutoScroll = true;
    let lastRenderedSeq = 0;
    let debugUiBootstrapped = false;
    let debugPollTimer = null;

    function hideReceiverDebugUi() {
      if (debugToggle) debugToggle.style.setProperty("display", "none", "important");
      if (debugPanel) debugPanel.classList.add("hidden");
    }

    if (!receiverDebugUiActive) {
      hideReceiverDebugUi();
    }

    function formatDebugTimestamp(value) {
      const raw = String(value || "");
      if (!raw) return "";
      return raw.length >= 19 ? raw.substring(11, 19) : raw;
    }

    function createEntryNode(entry) {
      const row = document.createElement("div");
      row.className = "debugEntry";

      const line = document.createElement("div");
      line.className = "line";

      const ts = document.createElement("span");
      ts.className = "timestamp";
      ts.textContent = formatDebugTimestamp(entry.ts);

      const seq = document.createElement("span");
      seq.className = "seq";
      seq.textContent = `#${String(entry.seq || "")}`;

      const event = document.createElement("span");
      event.className = "event";
      event.textContent = String(entry.event || "");

      line.appendChild(ts);
      line.appendChild(seq);
      line.appendChild(event);

      const payload = document.createElement("div");
      payload.className = "payload";
      try {
        payload.textContent = JSON.stringify(entry.payload || {});
      } catch (_e) {
        payload.textContent = String(entry.payload || "");
      }

      row.appendChild(line);
      row.appendChild(payload);
      return row;
    }

    function trimDebugDom() {
      const maxNodes = 200;
      while (debugLogsContainer.children.length > maxNodes) {
        debugLogsContainer.removeChild(debugLogsContainer.firstChild);
      }
    }

    function updateDebugDisplay(forceFullRender) {
      if (!receiverDebugUiActive || !debugLogsContainer) return;
      const history = Array.isArray(window.__preettvDebug) ? window.__preettvDebug : [];

      if (forceFullRender) {
        debugLogsContainer.innerHTML = "";
        lastRenderedSeq = 0;
      }

      const newEntries = history.filter((entry) => Number(entry.seq || 0) > lastRenderedSeq);
      if (newEntries.length === 0) {
        if (debugHeaderTitle) debugHeaderTitle.textContent = `Debug (${history.length})`;
        return;
      }

      const frag = document.createDocumentFragment();
      for (const entry of newEntries) {
        frag.appendChild(createEntryNode(entry));
      }
      debugLogsContainer.appendChild(frag);
      trimDebugDom();
      lastRenderedSeq = Number(history[history.length - 1].seq || lastRenderedSeq);

      if (debugAutoScroll) {
        debugLogsContainer.scrollTop = debugLogsContainer.scrollHeight;
      }
      if (debugHeaderTitle) debugHeaderTitle.textContent = `Debug (${history.length})`;
    }

    function setDebugAutoScroll(enabled) {
      debugAutoScroll = !!enabled;
      if (debugAutoScrollBtn) {
        debugAutoScrollBtn.textContent = debugAutoScroll ? 'Auto-scroll: ON' : 'Auto-scroll: OFF';
        debugAutoScrollBtn.classList.toggle('active', debugAutoScroll);
      }
      if (debugAutoScroll) {
        debugLogsContainer.scrollTop = debugLogsContainer.scrollHeight;
      }
    }

    function toggleDebugPanel() {
      debugPanelVisible = !debugPanelVisible;
      if (debugPanelVisible) {
        debugPanel.classList.remove('hidden');
        debugToggle.textContent = 'DEBUG: ON';
        debugToggle.style.background = '#45a049';
        updateDebugDisplay();
      } else {
        debugPanel.classList.add('hidden');
        debugToggle.textContent = 'DEBUG: OFF';
        debugToggle.style.background = '#4CAF50';
      }
    }

    function bootstrapReceiverDebugUi() {
      if (debugUiBootstrapped) return;
      debugUiBootstrapped = true;
      receiverDebugUiActive = true;
      document.body.classList.add("receiver-debug");
      if (debugToggle) debugToggle.style.removeProperty("display");
      const statusNode = document.getElementById("status");
      if (statusNode) statusNode.style.removeProperty("display");
      debugToggle.addEventListener('click', toggleDebugPanel);
      debugHeader.addEventListener('click', (ev) => {
        if (ev.target === debugAutoScrollBtn) return;
        toggleDebugPanel();
      });
      if (debugAutoScrollBtn) {
        debugAutoScrollBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          setDebugAutoScroll(!debugAutoScroll);
        });
      }
      debugLogsContainer.addEventListener('scroll', () => {
        const nearBottom = debugLogsContainer.scrollHeight - debugLogsContainer.scrollTop - debugLogsContainer.clientHeight < 48;
        if (!nearBottom && debugAutoScroll) {
          setDebugAutoScroll(false);
        }
      });
      window.addEventListener('error', (ev) => {
        pushUiErrorLog('ui.error', {
          message: ev && ev.message ? ev.message : 'unknown',
          filename: ev && ev.filename ? ev.filename : '',
          lineno: ev && ev.lineno ? ev.lineno : 0,
          colno: ev && ev.colno ? ev.colno : 0,
        });
      });
      window.addEventListener('unhandledrejection', (ev) => {
        const reason = ev && ev.reason;
        pushUiErrorLog('ui.unhandledrejection', {
          reason: reason && reason.message ? reason.message : String(reason || 'unknown'),
        });
      });
      if (!debugPollTimer) {
        debugPollTimer = setInterval(() => {
          if (receiverDebugUiActive) {
            updateDebugDisplay(false);
          }
        }, 350);
      }
      debugPanelVisible = true;
      if (debugPanel) debugPanel.classList.remove('hidden');
      if (debugToggle) {
        debugToggle.textContent = 'DEBUG: ON';
        debugToggle.style.background = '#45a049';
      }
      updateDebugDisplay(true);
    }

    window.__preettvActivateDebugUi = bootstrapReceiverDebugUi;
    window.__preettvNotifyDebugLog = function () {
      if (!receiverDebugUiActive) {
        if (window.__preettvReceiverDebugUiEnabled) {
          bootstrapReceiverDebugUi();
        }
        return;
      }
      updateDebugDisplay(false);
    };

    if (receiverDebugUiActive || window.__preettvPendingDebugUi) {
      bootstrapReceiverDebugUi();
      window.__preettvPendingDebugUi = false;
    } else {
      setInterval(() => {
        if (!receiverDebugUiActive && (window.__preettvReceiverDebugUiEnabled || window.__preettvPendingDebugUi)) {
          bootstrapReceiverDebugUi();
          window.__preettvPendingDebugUi = false;
        }
      }, 250);
    }

    function pushUiErrorLog(event, payload) {
      if (!receiverDebugUiActive) return;
      const history = Array.isArray(window.__preettvDebug) ? window.__preettvDebug : [];
      const seq = history.length > 0 ? Number(history[history.length - 1].seq || history.length) + 1 : 1;
      history.push({
        seq,
        ts: new Date().toISOString(),
        event,
        payload,
      });
      window.__preettvDebug = history;
      if (debugPanelVisible) updateDebugDisplay();
    }

    // Browser-mode controls — always define in global scope so onclick works.
    function bcLoad() {
      const inp = document.getElementById('bcStreamUrl');
      const url = (inp && inp.value) ? inp.value.trim() : '';
      if (!url) return;
      if (typeof window.__bcLoadUrl === 'function') {
        window.__bcLoadUrl(url);
      }
    }

    function bcStop() {
      if (typeof window.__bcStop === 'function') window.__bcStop();
    }

    // Show browser tester when ?url= / ?browser=1 is used (even if Cast SDK script is loaded).
    (function showBrowserControlsIfNeeded() {
      const getUrl = typeof window.__getStreamUrlFromPage === 'function'
        ? window.__getStreamUrlFromPage
        : function () {
            const search = window.location.search || '';
            const marker = 'url=';
            const idx = search.toLowerCase().indexOf(marker);
            if (idx === -1) return '';
            try {
              return decodeURIComponent(search.substring(idx + marker.length).replace(/\+/g, ' ')).trim();
            } catch (_e) {
              return search.substring(idx + marker.length).trim();
            }
          };

      const query = new URLSearchParams(window.location.search || '');
      const browserFlag = String(query.get('browser') || query.get('test') || '').toLowerCase();
      const browserTest = !!getUrl() || browserFlag === '1' || browserFlag === 'true' || browserFlag === 'yes';

      if (browserTest) {
        const bc = document.getElementById('browserControls');
        if (bc) bc.style.display = 'block';
        const urlParam = getUrl();
        if (urlParam) {
          const inp = document.getElementById('bcStreamUrl');
          if (inp) inp.value = urlParam;
        }
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PreetTV Cast Receiver</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        /* CAF requires <cast-media-player> in the page; playback video is bound via setMediaElement(#castVideo). */
        cast-media-player {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            visibility: hidden;
            pointer-events: none;
            z-index: -1;
            --progress-color: #ff0000;
            --splash-image: none;
        }

        #castVideo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 0;
            background: #000;
        }

        /* Log overlay: selectable, scrollable (D-pad / wheel / touch). Must allow pointer-events for selection. */
        #debug {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            max-height: 38vh;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            overscroll-behavior: contain;
            box-sizing: border-box;
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.88);
            color: #7bed9f;
            font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
            font-size: clamp(9px, 1.05vmin, 11px);
            line-height: 1.4;
            z-index: 2147483647;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
            outline: none;
        }

        #debug .log-row {
            margin: 0 0 2px 0;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        #debug .log-row-error {
            color: #ff8787;
        }

        #debug .log-row-warn {
            color: #ffe066;
        }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>
    <video id="castVideo" playsinline crossorigin="anonymous"></video>
    <div id="debug" class="log-viewer" tabindex="0" role="log" aria-label="Receiver debug log"></div>
    <!-- mpegts.js: MSE transmux for MPEG-TS (fixes CAF detailedErrorCode 104 MEDIA_SRC_NOT_SUPPORTED on raw TS). -->
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="receiver.js"></script>
</body>
</html>

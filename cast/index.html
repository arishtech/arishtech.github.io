<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PreetTV Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      opacity: 0.7;
      font-size: 12px;
    }
    #debugPanel {
      position: absolute;
      right: 0;
      top: 0;
      width: 400px;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      border-left: 2px solid #4CAF50;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: monospace;
      z-index: 10000;
    }
    #debugPanel.hidden {
      display: none;
    }
    #debugHeader {
      background: #1a1a1a;
      border-bottom: 1px solid #4CAF50;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      color: #4CAF50;
      cursor: pointer;
      user-select: none;
    }
    #debugLogs {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 11px;
      line-height: 1.4;
    }
    .debugEntry {
      margin-bottom: 6px;
      padding: 4px;
      border-left: 2px solid #4CAF50;
      padding-left: 8px;
      color: #00ff00;
    }
    .debugEntry .timestamp {
      color: #888;
      font-size: 9px;
    }
    .debugEntry .seq {
      color: #4CAF50;
      font-weight: bold;
    }
    .debugEntry .event {
      color: #4CAF50;
      font-weight: bold;
    }
    .debugEntry .payload {
      color: #00dd00;
      font-size: 10px;
      margin-top: 2px;
      word-break: break-all;
    }
    #debugToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #4CAF50;
      color: #000;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      z-index: 10001;
    }
    #debugToggle:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="status">PreetTV Receiver Ready</div>

  <!-- Debug Panel -->
  <button id="debugToggle">DEBUG: OFF</button>
  <div id="debugPanel" class="hidden">
    <div id="debugHeader">PreetTV Debug Logs (Click to collapse)</div>
    <div id="debugLogs"></div>
  </div>

  <script src="receiver.js"></script>
  <script>
    // Debug panel UI controller
    const debugPanel = document.getElementById('debugPanel');
    const debugToggle = document.getElementById('debugToggle');
    const debugLogsContainer = document.getElementById('debugLogs');
    const debugHeader = document.getElementById('debugHeader');

    let debugPanelVisible = true;

    function createEntryNode(entry) {
      const row = document.createElement("div");
      row.className = "debugEntry";

      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = String(entry.ts || "");

      const title = document.createElement("div");
      const seq = document.createElement("span");
      seq.className = "seq";
      seq.textContent = `#${String(entry.seq || "")}`;
      const spacer = document.createTextNode(" ");
      const event = document.createElement("span");
      event.className = "event";
      event.textContent = String(entry.event || "");
      title.appendChild(seq);
      title.appendChild(spacer);
      title.appendChild(event);

      const payload = document.createElement("div");
      payload.className = "payload";
      payload.textContent = JSON.stringify(entry.payload || {}, null, 1);

      row.appendChild(ts);
      row.appendChild(title);
      row.appendChild(payload);
      return row;
    }

    function updateDebugDisplay() {
      const history = window.__preettvDebug || [];
      const lastEntries = history.slice(-20); // Show last 20 entries

      const frag = document.createDocumentFragment();
      for (const entry of lastEntries) {
        frag.appendChild(createEntryNode(entry));
      }
      debugLogsContainer.innerHTML = "";
      debugLogsContainer.appendChild(frag);

      // Auto-scroll to bottom
      debugLogsContainer.scrollTop = debugLogsContainer.scrollHeight;
      debugHeader.textContent = `PreetTV Debug Logs (${history.length})`;
    }

    function toggleDebugPanel() {
      debugPanelVisible = !debugPanelVisible;
      if (debugPanelVisible) {
        debugPanel.classList.remove('hidden');
        debugToggle.textContent = 'DEBUG: ON';
        debugToggle.style.background = '#45a049';
        updateDebugDisplay();
      } else {
        debugPanel.classList.add('hidden');
        debugToggle.textContent = 'DEBUG: OFF';
        debugToggle.style.background = '#4CAF50';
      }
    }

    debugToggle.addEventListener('click', toggleDebugPanel);
    debugHeader.addEventListener('click', toggleDebugPanel);

    if (debugPanelVisible) {
      debugPanel.classList.remove('hidden');
      debugToggle.textContent = 'DEBUG: ON';
      debugToggle.style.background = '#45a049';
      updateDebugDisplay();
    }

    // Update debug display every 500ms when visible
    setInterval(() => {
      if (debugPanelVisible) {
        updateDebugDisplay();
      }
    }, 500);
  </script>
</body>
</html>
